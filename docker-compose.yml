name: maxkb4j-prod

services:
  postgres:
    image: registry.cn-hangzhou.aliyuncs.com/tarzanx/pgvector:0.7.0-pg15
    container_name: maxkb4j-pgvector
    restart: always
    networks:
      - maxkb4j_network
    environment:
      POSTGRES_USER: tarzan_postgres
      POSTGRES_PASSWORD: ycn4NRhjN2
      POSTGRES_DB: MaxKB4j
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tarzan_postgres -d MaxKB4j"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo:
    image: registry.cn-hangzhou.aliyuncs.com/tarzanx/mongo:8.0
    container_name: maxkb4j-mongo
    restart: always
    networks:
      - maxkb4j_network
    environment:
      TZ: 'Asia/Shanghai'
      MONGO_INITDB_ROOT_USERNAME: tarzan_mongo
      MONGO_INITDB_ROOT_PASSWORD: ycn4NRhjN2
    volumes:
      - ./mongo/data:/data/db
      - ./mongo/configdb:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "tarzan_mongo", "-p", "ycn4NRhjN2", "--authenticationDatabase", "admin"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  maxkb4j:
    container_name: maxkb4j-app
    image: maxkb4j:latest
    ports:
      - "8080:8080"
    networks:
      - maxkb4j_network
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: always
    logging:
      options:
        max-size: "30m"
        max-file: "3"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    volumes:
      - ./logs:/logs
      - ./config:/opt/running/config
      - ./server.crt:/tmp/certs/server.crt
      # 如需使用文档目录监控功能，取消下面注释并修改路径
      # - E:/docs/watch

networks:
  maxkb4j_network: